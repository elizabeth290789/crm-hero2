<script>
  (function () {
    function useState(initialState) {
      var state = Object.assign({}, initialState);

      return [
        function getState(key) {
          return state[key];
        },
        function setState(key, nextValue) {
          state[key] =
            typeof nextValue === "function" ? nextValue(state[key]) : nextValue;

          return state[key];
        },
      ];
    }

    var featureState = useState({
      "lead-generation": true,
      "sales-funnel": true,
      "ai-assistant": true,
    });
    var getFeatureActive = featureState[0];
    var setFeatureActive = featureState[1];
    var chips = document.querySelectorAll("[data-feature-chip]");

    chips.forEach(function (chip) {
      chip.addEventListener("click", function () {
        var featureName = chip.getAttribute("data-feature-chip");
        var isActive = setFeatureActive(featureName, function (currentValue) {
          return !currentValue;
        });

        chip.classList.toggle("is-active", isActive);
        chip.setAttribute("aria-pressed", String(getFeatureActive(featureName)));
      });
    });
  })();
</script>
